<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Smart Classroom</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🎓 Smart Classroom Seat Booking System</h1>

    <h2>Admin Dashboard</h2>

    <nav>
        <a href="index.html">Student Page</a> |
        <a href="admin.html">Admin Dashboard</a>
    </nav>

    <br>

    <button onclick="loadSeats()">Refresh Seats</button>

    <br><br>

    <table>
        <thead>
            <tr>
                <th>Seat Number</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="seatTable">
        </tbody>
    </table>

    <script>
        async function loadSeats() {

            const response = await fetch("/seats");
            const seats = await response.json();

            const table = document.getElementById("seatTable");

            table.innerHTML = "";

            seats.forEach(seat => {

                table.innerHTML += `
                <tr>
                    <td>${seat.seat_number}</td>
                    <td>${seat.status}</td>
                    <td>
                        <button onclick="resetSeat(${seat.id})">
                            Reset
                        </button>
                    </td>
                </tr>`;
            });
        }

        async function resetSeat(id) {

            await fetch(`/reset/${id}`, {
                method: "POST"
            });

            alert("Seat Reset Successfully");

            loadSeats();
        }

        loadSeats();
    </script>

</body>
</html>
